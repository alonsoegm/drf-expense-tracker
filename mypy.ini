# mypy.ini
# Configuration for mypy static type checker

[mypy]
# ============================================================================
# BASIC SETTINGS
# ============================================================================
python_version = 3.13
# Target Python version (adjust to your version)

warn_return_any = True
# Warn if function returns Any type

warn_unused_configs = True
# Warn about unused mypy config sections

# ============================================================================
# STRICTNESS LEVELS (Start lenient, increase over time)
# ============================================================================
# We'll start with low strictness and increase gradually

# Disallow untyped definitions
disallow_untyped_defs = False
# Set to True later when you add more type hints

# Disallow incomplete types
disallow_incomplete_defs = False
# Set to True later

# Check untyped function definitions
check_untyped_defs = True
# Check function bodies even without type hints

# Disallow untyped calls
disallow_untyped_calls = False
# Set to True later (very strict!)

# ============================================================================
# ERROR REPORTING
# ============================================================================
show_error_codes = True
# Show error codes like [arg-type], [return-value]

show_column_numbers = True
# Show column numbers in errors

pretty = True
# Use colors and formatting in output

# ============================================================================
# IMPORT DISCOVERY
# ============================================================================
namespace_packages = True
# Support PEP 420 namespace packages

ignore_missing_imports = True
# Don't error on imports without stubs (for now)

# ============================================================================
# DJANGO SETTINGS
# ============================================================================
plugins =
    mypy_django_plugin.main,
    mypy_drf_plugin.main

[mypy.plugins.django-stubs]
django_settings_module = expense_tracker.settings
# Point to Django settings

# ============================================================================
# PER-MODULE SETTINGS
# ============================================================================
# You can configure specific modules differently

[mypy-*.migrations.*]
# Ignore migrations (auto-generated code)
ignore_errors = True

[mypy-*.tests.*]
# Less strict for tests
disallow_untyped_defs = False

# ============================================================================
# THIRD-PARTY MODULES WITHOUT STUBS
# ============================================================================
# Some packages don't have type stubs yet
# We'll ignore them for now

[mypy-rest_framework.*]
ignore_missing_imports = True

# ============================================================================
# STRICTNESS ROADMAP
# ============================================================================
# As your codebase grows, gradually enable these:
#
# Phase 1 (Current):
# - check_untyped_defs = True ✓
# - ignore_missing_imports = True ✓
#
# Phase 2:
# - disallow_incomplete_defs = True
# - warn_redundant_casts = True
#
# Phase 3:
# - disallow_untyped_defs = True
# - disallow_any_generics = True
#
# Phase 4 (Strictest):
# - disallow_untyped_calls = True
# - strict = True
