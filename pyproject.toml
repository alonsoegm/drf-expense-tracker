# pyproject.toml
# Configuration for Python tools

# ============================================================================
# BLACK - Code Formatter
# ============================================================================
[tool.black]
line-length = 88  # Default, matches PEP 8
target-version = ['py311']  # Python 3.11+
include = '\.pyi?$'  # Format .py and .pyi files
extend-exclude = '''
/(
    # Exclude these directories
    \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | venv
  | _build
  | buck-out
  | build
  | dist
  | migrations  # Don't format Django migrations
)/
'''

# ============================================================================
# Why these settings?
# ============================================================================
# line-length = 88: Black's default, slightly longer than PEP 8's 79
#                   Good balance between readability and compactness
# target-version: Tells Black which Python features to use
# extend-exclude: Don't format auto-generated files (migrations)

# ============================================================================
# ISORT - Import Organizer
# ============================================================================
[tool.isort]
profile = "black"  # Make isort compatible with Black
line_length = 88   # Match Black's line length
multi_line_output = 3  # Vertical hanging indent
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
skip_gitignore = true  # Skip files in .gitignore

# Import grouping
sections = [
    "FUTURE",
    "STDLIB",      # Python standard library
    "THIRDPARTY",  # Third-party packages (Django, DRF, etc.)
    "FIRSTPARTY",  # Our project
    "LOCALFOLDER"  # Relative imports
]

known_third_party = ["django", "rest_framework"]

# Organize imports in this order
import_heading_stdlib = "Standard Library"
import_heading_thirdparty = "Third-party"
import_heading_firstparty = "Local"

# ============================================================================
# Why these settings?
# ============================================================================
# profile = "black": Makes isort work with Black (CRITICAL!)
# line_length = 88: Match Black's line length
# sections: Groups imports by type for better organization
# known_django/known_drf: Explicitly categorize these frameworks
