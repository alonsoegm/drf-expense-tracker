# ============================================================================
# PYTEST CONFIGURATION
# ============================================================================

[pytest]
DJANGO_SETTINGS_MODULE = expense_tracker.settings

python_files = test_*.py *_test.py
python_classes = Test* *Tests
python_functions = test_*

testpaths = tests

addopts =
    # Show summary of all test outcomes
    -ra

    # Verbose output (show each test name)
    -v

    # Show local variables in tracebacks
    -l

    # Show extra test summary info
    --tb=short

    # Strict markers (fail on unknown markers)
    --strict-markers

    # Warning filters
    --disable-warnings

    # ========================================================================
    # COVERAGE OPTIONS - ADD THESE
    # ========================================================================
    # Measure coverage for expenses app
    --cov=expenses

    # Generate HTML report (view with: open htmlcov/index.html)
    --cov-report=html

    # Show missing lines in terminal
    --cov-report=term-missing

    # Fail if coverage is below 90%
    --cov-fail-under=90

markers =
    unit: Unit tests (models, serializers)
    integration: Integration tests (API endpoints)
    slow: Slow running tests

# ============================================================================
# COMPARISON TO C#
# ============================================================================
#
# pytest.ini is like:
# - xunit.runner.json (xUnit configuration)
# - .runsettings (Visual Studio test settings)
#
# Configure:
# - Test discovery patterns
# - Output verbosity
# - Coverage settings
# - Test markers (like [Trait] in xUnit)
